name: Android APK

# Builds a sideloadable debug APK of the Runout web app wrapped in Capacitor.
# This container has no Android SDK, so the build runs here, where the
# GitHub-hosted runner already ships the SDK + build-tools. The APK lands as a
# downloadable artifact on every push (and on-demand via "Run workflow").
#
# Caveat (spec §3): a Capacitor APK runs the web build inside the system
# WebView, which uses the web-Android audio output path the spec flags as the
# latency weak point — and cross-origin isolation headers aren't sent for the
# local scheme, so SharedArrayBuffer is unavailable and the engine takes its
# postMessage fallback. This measures *wrapped-web* feel, not native Oboe.

on:
  push:
    branches: ["main", "claude/**"]
  workflow_dispatch:

permissions:
  contents: write # needed to publish the APK to a Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      # Correctness gate for the pure model layer (radius↔time inversion,
      # platter physics, envelope DSP). Fast, dependency-free; fails the build
      # before we bother wrapping an APK around a broken model.
      - name: Test the model layer
        run: npm test

      - name: Stage web app into www/
        run: npm run build:web

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Sync web assets into the Android project
        run: npx --no-install cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      # Give the APK a UNIQUE, per-commit filename. Reusing app-debug.apk meant
      # browsers and Android's download manager served a stale cached copy, so
      # new builds looked like they "didn't ship". A unique name is cache-proof.
      - name: Name the APK by commit
        id: apkname
        run: |
          SHORT=$(git rev-parse --short HEAD)
          cp android/app/build/outputs/apk/debug/app-debug.apk "runout-${SHORT}.apk"
          echo "file=runout-${SHORT}.apk" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: runout-debug-apk
          path: ${{ steps.apkname.outputs.file }}
          if-no-files-found: error

      # Publish to the rolling v0 release. We upload BOTH:
      #   • runout-<sha>.apk — unique per build, cache-proof, the link to share
      #   • app-debug.apk    — stable name, for anyone who wants the latest
      # Download (cache-proof):
      #   https://github.com/mbaliga/Music_Player/releases/download/v0-latest/runout-<sha>.apk
      - name: Publish APK to the rolling v0 release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0-latest
          name: Runout v0 — latest debug APK
          prerelease: true
          body: >
            Auto-built debug APK from the latest push on this branch
            (build ${{ steps.apkname.outputs.short }}). v0 web build wrapped in a
            Capacitor WebView (postMessage fallback, not native Oboe — see README
            §3). For a guaranteed-fresh download use the per-build file
            runout-${{ steps.apkname.outputs.short }}.apk rather than the cached
            app-debug.apk.
          files: |
            ${{ steps.apkname.outputs.file }}
            android/app/build/outputs/apk/debug/app-debug.apk
